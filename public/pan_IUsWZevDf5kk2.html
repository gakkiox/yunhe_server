<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推荐资源管理</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Element Plus -->
  <link href="https://cdn.bootcdn.net/ajax/libs/element-plus/2.11.4/index.css" rel="stylesheet">
  <!-- 引入 Vue 3 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.5.22/vue.global.prod.js"></script>
  <!-- 引入 Element Plus JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/element-plus/2.11.4/index.full.min.js"></script>
  <!-- 引入 Axios -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.10.0/axios.min.js" integrity="sha512-WkZrEcQ5LMyNy6Y2PQf+Tu3vMcsmKKRKuPXtJSTHQJ3mpuvLRlA5dlDDhrrcXfyWr6Z/y3wIMfjfqVFO/gDZYQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="bg-gray-50 min-h-screen">
  <div id="app" class="container mx-auto px-4 py-8">
    <!-- 页面标题和新增按钮 -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">推荐资源管理</h1>
      <div>
        <el-button type="primary" @click="toEditArticle()" class="bg-blue-600">
          文章编辑
        </el-button>
        <el-button style="margin-left: 20px;" type="primary" @click="openAddDialog()" class="bg-blue-600">
          新增资源
        </el-button>
      </div>

    </div>

    <!-- 数据表格 -->
    <el-card shadow="hover" class="mb-6">
      <el-table :data="tableData" border stripe class="w-full" :loading="loading">
        <el-table-column prop="name" label="资源名称" min-width="200"></el-table-column>
        <el-table-column prop="short_name" label="简称" width="120"></el-table-column>
        <el-table-column prop="pan_type" label="网盘类型" width="120"></el-table-column>
        <el-table-column prop="link" label="链接" min-width="300">
          <template #default="scope">
            <a :href="scope.row.link" target="_blank" class="text-blue-600 hover:underline">
              {{ scope.row.link }}
            </a>
          </template>
        </el-table-column>
        <el-table-column prop="date" label="发布日期" width="180"></el-table-column>
        <el-table-column prop="pwd" label="提取密码" width="120"></el-table-column>
        <el-table-column label="操作" width="200"  fixed="right" >
          <template #default="scope">
            <el-button type="primary" size="small" @click="openEditDialog(scope.row)" class="mr-2 bg-green-600">
              编辑
            </el-button>
            <el-button type="danger" size="small" @click="handleDelete(scope.row)" class="bg-red-600">
              删除
            </el-button>
          </template>
        </el-table-column>
      </el-table>
    </el-card>

    <!-- 新增/编辑弹窗 -->
    <el-dialog v-model="dialogVisible" :title="dialogTitle" width="600px" @close="resetForm">
      <el-form :model="formData" :rules="formRules" ref="formRef" label-width="100px" class="space-y-4">
        <el-form-item label="资源名称" prop="name">
          <el-input v-model="formData.name" placeholder="请输入资源名称" />
        </el-form-item>
        <el-form-item label="简称" prop="short_name">
          <el-input v-model="formData.short_name" placeholder="请输入资源简称" />
        </el-form-item>
        <el-form-item label="网盘类型" prop="pan_type">
          <el-select v-model="formData.pan_type" placeholder="请选择网盘类型">
            <el-option label="百度网盘" value="百度网盘"></el-option>
            <el-option label="阿里云盘" value="阿里云盘"></el-option>
            <el-option label="夸克网盘" value="夸克网盘"></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="链接" prop="link">
          <el-input v-model="formData.link" placeholder="请输入网盘链接" />
        </el-form-item>
        <el-form-item label="发布日期" prop="date">
          <el-date-picker v-model="formData.date" type="date" placeholder="请选择发布日期" format="YYYY年MM月DD日"
            value-format="YYYY年MM月DD日" />
        </el-form-item>
        <el-form-item label="提取密码" prop="pwd">
          <el-input v-model="formData.pwd" placeholder="请输入提取密码" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitForm()" class="bg-blue-600">
          确认
        </el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue
    const { ElMessage, ElMessageBox } = ElementPlus

    createApp({
      setup() {
        // 状态管理
        const tableData = ref([])
        const loading = ref(false)
        const dialogVisible = ref(false)
        const dialogTitle = ref('新增资源')
        const formRef = ref(null)

        // 表单数据
        const formData = reactive({
          name: '',
          short_name: '',
          pan_type: '',
          link: '',
          date: '',
          pwd: '',
          s_id: ''
        })

        // 表单验证规则
        const formRules = reactive({
          name: [{ required: true, message: '请输入资源名称', trigger: 'blur' }],
          short_name: [{ required: false, message: '请输入资源简称', trigger: 'blur' }],
          pan_type: [{ required: true, message: '请选择网盘类型', trigger: 'change' }],
          link: [{ required: true, message: '请输入网盘链接', trigger: 'blur' }],
          date: [{ required: true, message: '请选择发布日期', trigger: 'change' }],
          pwd: [{ required: true, message: '请输入提取密码', trigger: 'blur' }]
        })

        // 获取数据列表
        const getList = async () => {
          try {
            loading.value = true
            // 实际项目中替换为真实接口地址
            const res = await axios.get('/recom/list')
            tableData.value = res.data.data
            console.log(tableData.value)
          } catch (error) {
            ElMessage.error('获取数据失败：' + error.message)
          } finally {
            loading.value = false
          }
        }

        // 打开新增弹窗
        const openAddDialog = () => {
          dialogTitle.value = '新增资源'
          resetForm()
          dialogVisible.value = true
        }

        // 打开编辑弹窗
        const openEditDialog = async (row) => {
          try {
            loading.value = true
            // 获取详情
            const res = await axios.get(`/recom/detail/${row.s_id}`)
            Object.assign(formData, res.data.data)
            dialogTitle.value = '编辑资源'
            dialogVisible.value = true
          } catch (error) {
            ElMessage.error('获取详情失败：' + error.message)
          } finally {
            loading.value = false
          }
        }

        // 重置表单
        const resetForm = () => {
          if (formRef.value) {
            formRef.value.resetFields()
          }
          Object.keys(formData).forEach(key => {
            formData[key] = ''
          })
        }

        // 提交表单
        const submitForm = async () => {
          try {
            await formRef.value.validate()
            loading.value = true

            if (formData.s_id) {
              // 编辑操作 - 实际项目中根据后端要求调整请求方式和参数
              await axios.post(`/recom/update/${formData.s_id}`, formData)
              ElMessage.success('修改成功！')
            } else {
              // 新增操作
              formData.s_id = 'PAN' + Date.now();
              await axios.post('/recom/add', formData)
              ElMessage.success('新增成功！')
            }

            dialogVisible.value = false
            getList() // 重新获取列表
          } catch (error) {
            if (error.name !== 'ValidationError') {
              ElMessage.error('操作失败：' + error.message)
            }
          } finally {
            loading.value = false
          }
        }

        // 删除操作
        const handleDelete = async (row) => {
          try {
            await ElMessageBox.confirm(
              '此操作将永久删除该记录, 是否继续?',
              '提示',
              {
                confirmButtonText: '确定',
                cancelButtonText: '取消',
                type: 'warning'
              }
            )

            loading.value = true
            await axios.post(`/recom/delete/${row.s_id}`)
            ElMessage.success('删除成功！')
            getList() // 重新获取列表
          } catch (error) {
            if (error !== 'cancel') {
              ElMessage.error('删除失败：' + (error.message || '取消操作'))
            }
          } finally {
            loading.value = false
          }
        }

        // 初始化
        onMounted(() => {
          getList()
        })
        const toEditArticle = () => {
             window.open("/art_XyJdzA3mfevW.html", '_self', 'noopener,noreferrer');
        }
        return {
          tableData,
          loading,
          dialogVisible,
          dialogTitle,
          formData,
          formRules,
          formRef,
          getList,
          openAddDialog,
          openEditDialog,
          resetForm,
          submitForm,
          handleDelete,
          toEditArticle
        }
      }
    })
      .use(ElementPlus)
      .mount('#app')
  </script>
</body>

</html>
