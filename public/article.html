<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理系统</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.bootcdn.net/ajax/libs/element-plus/2.11.4/index.css" rel="stylesheet">
  <!-- 引入 Vue 3 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.5.22/vue.global.prod.js"></script>
  <!-- 引入 Element Plus JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/element-plus/2.11.4/index.full.min.js"></script>
  <!-- 引入 Axios -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.10.0/axios.min.js"
    integrity="sha512-WkZrEcQ5LMyNy6Y2PQf+Tu3vMcsmKKRKuPXtJSTHQJ3mpuvLRlA5dlDDhrrcXfyWr6Z/y3wIMfjfqVFO/gDZYQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="bg-gray-50">
  <div id="app" class="container mx-auto px-4 py-8 max-w-7xl">
    <!-- 操作栏 -->
    <div class="mb-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-800">文章管理</h1>
      <div class="flex space-x-3">
        <el-button type="primary" @click="renderArticles">生成文章</el-button>
        <el-button type="primary" @click="openAddDialog">新增文章</el-button>
        <el-button type="success" @click="openJsonImportDialog">JSON导入</el-button>
      </div>
    </div>

    <!-- 搜索栏 -->
    <div class="mb-6 p-4 bg-white rounded-lg shadow-sm">
      <el-form :inline="true" :model="searchForm" class="flex flex-wrap gap-4">
        <el-form-item label="标题关键词">
          <el-input v-model="searchForm.title" placeholder="请输入文章标题" clearable></el-input>
        </el-form-item>
        <el-form-item label="标签">
          <el-input v-model="searchForm.tags" placeholder="请输入标签关键词" clearable></el-input>
        </el-form-item>
        <el-form-item>
          <el-button type="primary" @click="fetchArticleList">搜索</el-button>
          <el-button @click="resetSearch">重置</el-button>
        </el-form-item>
      </el-form>
    </div>

    <!-- 文章表格 -->
    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
      <el-table :data="articleList" border stripe v-loading="loading">
        <el-table-column prop="title" label="文章标题" min-width="200"></el-table-column>
        <el-table-column prop="summary" label="摘要" min-width="300"></el-table-column>
        <el-table-column prop="tags" label="标签" min-width="200">
          <template #default="scope">
            <el-tag v-for="(tag, index) in getDisplayTags(scope.row.tags)" :key="index" size="small" class="mr-1 mb-1">
              {{ tag }}
            </el-tag>
            <span v-if="getTagCount(scope.row.tags) > 3" class="text-gray-500 text-xs ml-1">
              +{{ getTagCount(scope.row.tags) - 3 }}个
            </span>
          </template>
        </el-table-column>
        <el-table-column label="操作" width="200" fixed="right">
          <template #default="scope">
            <el-button type="primary" size="small" @click="openEditDialog(scope.row)">编辑</el-button>
            <el-button type="danger" size="small" @click="deleteArticle(scope.row.id)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
    </div>

    <!-- 分页 -->
    <div class="mt-4 flex justify-end">
      <el-pagination v-model:current-page="pagination.pageNum" v-model:page-size="pagination.pageSize"
        :total="pagination.total" layout="total, sizes, prev, pager, next, jumper" @size-change="fetchArticleList"
        @current-change="fetchArticleList"></el-pagination>
    </div>

    <!-- 新增/编辑弹窗 -->
    <el-dialog v-model="dialogVisible" :title="dialogType === 'add' ? '新增文章' : '编辑文章'" width="800px">
      <el-form :model="form" :rules="rules" ref="formRef" label-width="100px">
        <el-form-item label="文章标题" prop="title">
          <el-input v-model="form.title" placeholder="请输入文章标题"></el-input>
        </el-form-item>
        <el-form-item label="文章摘要" prop="summary">
          <el-input v-model="form.summary" type="textarea" :rows="3" placeholder="请输入文章摘要"></el-input>
        </el-form-item>
        <el-form-item label="文章内容" prop="content">
          <el-input v-model="form.content" type="textarea" :rows="8" placeholder="请输入文章内容"></el-input>
        </el-form-item>
        <el-form-item label="文章标签" prop="tags">
          <el-input v-model="form.tags" placeholder="请输入标签，多个标签用英文逗号分隔"></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitForm">{{ dialogType === 'add' ? '新增' : '编辑' }}</el-button>
      </template>
    </el-dialog>

    <!-- JSON导入弹窗 -->
    <el-dialog v-model="jsonImportVisible" title="JSON数据导入" width="800px">
      <el-form>
        <el-form-item label="JSON数据">
          <el-input v-model="jsonImportData" type="textarea" :rows="10"
            placeholder='请输入JSON格式的对象，例如：{"title": "标题", "summary": "摘要", "content": "内容", "tags": "标签1,标签2"}'></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="jsonImportVisible = false">取消</el-button>
        <el-button type="primary" @click="importFromJson">导入</el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue
    const { ElMessage, ElMessageBox } = ElementPlus

    createApp({
      setup() {
        // 加载状态
        const loading = ref(false)
        // 文章列表
        const articleList = ref([])
        // 搜索表单
        const searchForm = reactive({
          title: '',
          tags: ''
        })
        // 分页参数
        const pagination = reactive({
          pageNum: 1,
          pageSize: 10,
          total: 0
        })
        // 弹窗状态
        const dialogVisible = ref(false)
        const dialogType = ref('add') // add:新增 edit:编辑
        // JSON导入弹窗状态
        const jsonImportVisible = ref(false)
        const jsonImportData = ref('')
        // 表单数据
        const form = reactive({
          id: '',
          title: '',
          summary: '',
          content: '',
          tags: ''
        })
        // 表单验证规则
        const rules = reactive({
          title: [{ required: true, message: '请输入文章标题', trigger: 'blur' }],
          summary: [{ required: true, message: '请输入文章摘要', trigger: 'blur' }],
          content: [{ required: true, message: '请输入文章内容', trigger: 'blur' }],
          tags: [{ required: true, message: '请输入文章标签', trigger: 'blur' }]
        })
        const formRef = ref(null)

        // 获取要显示的标签（最多3个）
        const getDisplayTags = (tagsString) => {
          if (!tagsString) return []
          const tags = tagsString.split(',')
          return tags.slice(0, 3)
        }

        // 获取标签总数
        const getTagCount = (tagsString) => {
          if (!tagsString) return 0
          return tagsString.split(',').length
        }

        // 获取文章列表
        const fetchArticleList = async () => {
          loading.value = true
          try {
            // 模拟接口请求，实际开发中替换为真实接口
            const response = await fetch('/article/list', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                pageNum: pagination.pageNum,
                pageSize: pagination.pageSize,
                title: searchForm.title,
                tags: searchForm.tags
              })
            })
            const res = await response.json()
            if (res.code === 200) {
              articleList.value = res.data.list
              pagination.total = res.data.total
            } else {
              ElMessage.error('获取文章列表失败：' + res.message)
            }
          } catch (error) {
            ElMessage.error('网络错误，无法获取文章列表')
            console.error(error)
          } finally {
            loading.value = false
          }
        }

        // 重置搜索
        const resetSearch = () => {
          searchForm.title = ''
          searchForm.tags = ''
          pagination.pageNum = 1
          fetchArticleList()
        }

        // 打开新增弹窗
        const openAddDialog = () => {
          dialogType.value = 'add'
          // 重置表单
          form.id = ''
          form.title = ''
          form.summary = ''
          form.content = ''
          form.tags = ''
          dialogVisible.value = true
        }

        // 打开编辑弹窗
        const openEditDialog = (row) => {
          dialogType.value = 'edit'
          // 填充表单数据
          form.id = row.id
          form.title = row.title
          form.summary = row.summary
          form.content = row.content
          form.tags = row.tags
          dialogVisible.value = true
        }

        // 打开JSON导入弹窗
        const openJsonImportDialog = () => {
          jsonImportData.value = ''
          jsonImportVisible.value = true
        }

        // 从JSON导入数据（支持单个对象）
        const importFromJson = async () => {
          if (!jsonImportData.value.trim()) {
            ElMessage.warning('请输入JSON数据')
            return
          }

          try {
            const jsonData = JSON.parse(jsonImportData.value)

            // 验证数据结构
            if (Array.isArray(jsonData)) {
              // 如果是数组，则处理第一个元素
              if (jsonData.length === 0) {
                throw new Error('JSON数组为空')
              }
              if (jsonData.length > 1) {
                ElMessage.warning('检测到多个对象，将导入第一个对象')
              }
              var article = jsonData[0]
            } else if (typeof jsonData === 'object' && jsonData !== null) {
              // 如果是单个对象
              var article = jsonData
            } else {
              throw new Error('JSON数据应为对象或数组格式')
            }

            // 验证必要字段
            if (!article.title || !article.summary || !article.content || !article.tags) {
              throw new Error('JSON对象缺少必要字段(title, summary, content, tags)')
            }

            // 添加文章
            const response = await fetch('/article/add', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(article)
            })
            const res = await response.json()
            if (res.code === 200) {
              ElMessage.success('成功导入文章')
              jsonImportVisible.value = false
              fetchArticleList() // 重新加载列表
            } else {
              ElMessage.error(`导入文章失败: ${res.message}`)
            }
          } catch (error) {
            console.error(error)
            ElMessage.error('JSON数据格式错误或网络错误: ' + error.message)
          }
        }

        // 提交表单
        const submitForm = async () => {
          try {
            await formRef.value.validate()
            let url = '/article/add'
            let methodText = '新增'
            if (dialogType.value === 'edit') {
              url = '/article/edit'
              methodText = '编辑'
            }

            // 模拟接口请求，实际开发中替换为真实接口
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(form)
            })
            const res = await response.json()
            if (res.code === 200) {
              ElMessage.success(methodText + '文章成功')
              dialogVisible.value = false
              fetchArticleList() // 重新加载列表
            } else {
              ElMessage.error(methodText + '文章失败：' + res.message)
            }
          } catch (error) {
            ElMessage.error('表单验证失败，请检查输入内容')
            console.error(error)
          }
        }

        // 删除文章
        const deleteArticle = async (id) => {
          try {
            await ElMessageBox.confirm(
              '此操作将永久删除该文章, 是否继续?',
              '提示',
              {
                confirmButtonText: '确定',
                cancelButtonText: '取消',
                type: 'warning'
              }
            )
            // 模拟接口请求，实际开发中替换为真实接口
            const response = await fetch('/article/delete', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id })
            })
            const res = await response.json()
            if (res.code === 200) {
              ElMessage.success('删除文章成功')
              fetchArticleList() // 重新加载列表
            } else {
              ElMessage.error('删除文章失败：' + res.message)
            }
          } catch (error) {
            ElMessage.info('已取消删除')
            console.error(error)
          }
        }
        const renderArticles = async function () {
          const response = await fetch('/article/render', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({action: "render"})
          })
          const res = await response.json()
          if (res.code === 200) {
            ElMessage.success('重新生成文章成功')
            fetchArticleList() // 重新加载列表
          } else {
            ElMessage.error('重新生成文章失败：' + res.message)
          }
        }
        // 初始化加载列表
        onMounted(() => {
          fetchArticleList();
        })

        return {
          loading,
          articleList,
          searchForm,
          pagination,
          dialogVisible,
          dialogType,
          jsonImportVisible,
          jsonImportData,
          form,
          rules,
          formRef,
          fetchArticleList,
          resetSearch,
          openAddDialog,
          openEditDialog,
          openJsonImportDialog,
          importFromJson,
          submitForm,
          deleteArticle,
          getDisplayTags,
          getTagCount,
          renderArticles
        }
      }
    }).use(ElementPlus).mount('#app')
  </script>
</body>

</html>
